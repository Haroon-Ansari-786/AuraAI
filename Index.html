<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura AI - Universal Intelligence</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        surface: '#f9fafb',
                        'surface-dark': '#111827',
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom scrollbar for a cleaner UI */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background-color: #475569; }

        /* Typing cursor animation */
        .typing-cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background-color: currentColor;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 2px;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Prevent auto-zoom on mobile inputs */
        input, textarea, select { font-size: 16px !important; }

        /* Markdown overrides for message bubbles */
        .prose pre { background-color: #1e293b !important; color: #f8fafc !important; }
        .dark .prose pre { background-color: #000000 !important; }
        .prose p { margin-top: 0.5em; margin-bottom: 0.5em; }
        .prose p:first-child { margin-top: 0; }
        .prose p:last-child { margin-bottom: 0; }
    </style>
</head>

<body class="bg-surface dark:bg-surface-dark text-gray-900 dark:text-gray-100 flex min-h-screen transition-colors duration-300 font-sans m-0 p-0 antialiased">

    <div id="loading" class="fixed inset-0 flex flex-col items-center justify-center bg-white dark:bg-gray-900 z-[100] transition-opacity duration-500">
        <svg class="animate-spin h-10 w-10 text-blue-600 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <div class="text-xl font-semibold tracking-wide text-gray-800 dark:text-gray-200">Loading Aura AI...</div>
    </div>

    <div id="app" class="hidden flex w-full min-h-screen relative">
        
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden backdrop-blur-sm" onclick="toggleSidebar()"></div>

        <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-72 bg-gray-50 dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 flex flex-col h-[100dvh]">
            <div class="p-4 flex items-center justify-between border-b border-gray-200 dark:border-gray-800">
                <div class="flex items-center gap-2 font-bold text-xl text-blue-600 dark:text-blue-400">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                    Aura AI
                </div>
                <button onclick="toggleSidebar()" class="md:hidden p-2 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 rounded-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>

            <div class="p-3">
                <button onclick="createNewChat()" class="w-full flex items-center justify-center gap-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-800 dark:text-gray-200 font-medium py-2.5 px-4 rounded-xl transition-colors shadow-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    New Chat
                </button>
            </div>

            <div class="flex-1 overflow-y-auto p-3 space-y-1" id="chat-list">
                </div>

            <div class="p-4 border-t border-gray-200 dark:border-gray-800 flex items-center gap-2">
                <button onclick="openSettings()" class="flex-1 flex items-center justify-center gap-2 py-2 px-3 text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-800 rounded-lg transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    Settings
                </button>
                <button onclick="toggleTheme()" class="p-2 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-800 rounded-lg transition-colors" title="Toggle Theme" id="theme-btn">
                    </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 bg-white dark:bg-gray-950 relative">
            
            <header class="sticky top-0 z-20 bg-white/80 dark:bg-gray-950/80 backdrop-blur-md border-b border-gray-100 dark:border-gray-800 px-4 py-3 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar()" class="md:hidden p-1.5 -ml-1.5 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                    </button>
                    <div id="current-chat-title" class="font-semibold text-gray-800 dark:text-gray-200 truncate max-w-[150px] sm:max-w-xs">New Chat</div>
                </div>
                
                <div class="hidden sm:flex items-center bg-gray-100 dark:bg-gray-800 px-3 py-1.5 rounded-full text-xs font-medium text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-gray-700 shadow-sm">
                    <svg class="w-3.5 h-3.5 mr-1.5 text-blue-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 19h20L12 2zm0 3.8l6.5 11.2H5.5L12 5.8z"/></svg>
                    <span id="header-model-name">Loading model...</span>
                </div>
            </header>

            <div id="chat-messages" class="flex-1 w-full max-w-4xl mx-auto p-4 md:p-6 pb-32 space-y-6">
                <div id="welcome-screen" class="flex flex-col items-center justify-center h-full text-center space-y-4 text-gray-500 dark:text-gray-400 opacity-0 transition-opacity duration-500 hidden">
                    <div class="w-16 h-16 bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-full flex items-center justify-center mb-2 shadow-sm border border-blue-200 dark:border-blue-800">
                        <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-200">How can I help you today?</h2>
                    <p class="max-w-md text-sm">Experience universal intelligence. Enter a prompt below to start exploring.</p>
                </div>
            </div>

            <div class="sticky bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-white via-white to-transparent dark:from-gray-950 dark:via-gray-950 z-20 pb-safe">
                <div class="max-w-4xl mx-auto relative">
                    <div class="flex items-end bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-3xl shadow-lg p-2 transition-all focus-within:ring-2 focus-within:ring-blue-500/50 focus-within:border-blue-500">
                        <textarea id="chat-input" rows="1" class="w-full max-h-48 min-h-[44px] bg-transparent border-0 focus:ring-0 resize-none py-2.5 px-4 text-gray-900 dark:text-gray-100 placeholder-gray-500 dark:placeholder-gray-400 m-0" placeholder="Message Aura AI..."></textarea>
                        
                        <button id="send-btn" onclick="handleSend()" class="p-2.5 ml-2 mb-0.5 bg-blue-600 hover:bg-blue-700 text-white rounded-full transition-transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed flex-shrink-0 shadow-md">
                            <svg id="send-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                            <svg id="stop-icon" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
                        </button>
                    </div>
                    <div class="text-center mt-2 text-[10px] text-gray-400 dark:text-gray-500">
                        AI can make mistakes. Verify important information.
                    </div>
                </div>
            </div>

        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-200">
        <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-2xl w-full max-w-md border border-gray-200 dark:border-gray-700 transform scale-95 transition-transform duration-200" id="settings-card">
            <div class="p-5 border-b border-gray-200 dark:border-gray-800 flex items-center justify-between">
                <h3 class="text-lg font-bold text-gray-900 dark:text-gray-100 flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    Aura AI Settings
                </h3>
                <button onclick="closeSettings()" class="text-gray-500 hover:text-gray-800 dark:text-gray-400 dark:hover:text-gray-100">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            
            <div class="p-5 space-y-4 max-h-[70vh] overflow-y-auto">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">OpenRouter API Key <span class="text-red-500">*</span></label>
                    <input type="password" id="api-key-input" class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-shadow" placeholder="sk-or-v1-...">
                    <p class="text-xs text-gray-500 mt-1">Stored securely in your local browser storage.</p>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">AI Model (Free Tiers)</label>
                    <div class="relative">
                        <select id="model-select" class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg px-3 py-2 text-sm appearance-none focus:ring-2 focus:ring-blue-500 outline-none transition-shadow pr-8">
                            <option value="deepseek/deepseek-r1:free">DeepSeek R1 (Free)</option>
                            <option value="deepseek/deepseek-chat:free">DeepSeek Chat (Free)</option>
                            <option value="google/gemini-2.5-pro:free">Gemini 2.5 Pro (Free)</option>
                            <option value="google/gemini-2.5-flash:free">Gemini 2.5 Flash (Free)</option>
                            <option value="meta-llama/llama-3.1-8b-instruct:free">Llama 3.1 8B Instruct (Free)</option>
                            <option value="cognitivecomputations/dolphin3.0-r1-mistral-24b:free">Dolphin 3.0 R1 Mistral (Free)</option>
                            <option value="mistralai/mistral-nemo:free">Mistral Nemo (Free)</option>
                            <option value="qwen/qwen-2.5-72b-instruct:free">Qwen 2.5 72B Instruct (Free)</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">System Prompt</label>
                    <textarea id="system-prompt-input" rows="3" class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-shadow resize-y" placeholder="You are a helpful assistant..."></textarea>
                </div>
            </div>

            <div class="p-4 border-t border-gray-200 dark:border-gray-800 flex justify-end gap-3 bg-gray-50 dark:bg-gray-800/50 rounded-b-2xl">
                <button onclick="closeSettings()" class="px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg transition-colors">Cancel</button>
                <button onclick="saveSettings()" class="px-4 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors shadow-sm">Save Preferences</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIG & STATE
        // ==========================================
        const STORAGE_KEY = 'aura_ai_data';
        let appState = {
            apiKey: '',
            model: 'deepseek/deepseek-r1:free',
            systemPrompt: 'You are Aura AI, an intelligent, helpful, and highly capable conversational assistant. Structure your answers clearly using markdown formatting where appropriate.',
            darkMode: false,
            chats: [],
            currentChatId: null
        };

        let isGenerating = false;
        let abortController = null;

        // ==========================================
        // INITIALIZATION
        // ==========================================
        function initApp() {
            try {
                // Configure Marked.js safely
                if (typeof marked !== 'undefined') {
                    marked.setOptions({ breaks: true, gfm: true });
                }

                loadState();
                applyTheme();
                
                // Set UI from state
                document.getElementById('api-key-input').value = appState.apiKey || '';
                document.getElementById('model-select').value = appState.model;
                document.getElementById('system-prompt-input').value = appState.systemPrompt;
                
                updateHeaderModel();
                renderChatList();

                if (appState.chats.length === 0) {
                    createNewChat();
                } else if (!appState.currentChatId) {
                    selectChat(appState.chats[0].id);
                } else {
                    selectChat(appState.currentChatId);
                }

                setupTextareaAutoResize();

                // Hide loader, show app
                setTimeout(() => {
                    const loader = document.getElementById('loading');
                    loader.style.opacity = '0';
                    document.getElementById('app').classList.remove('hidden');
                    setTimeout(() => loader.remove(), 500);
                }, 300);

            } catch (error) {
                console.error("Initialization error:", error);
                document.getElementById('loading').innerHTML = `<div class="text-red-500 font-bold">Failed to load app: ${error.message}</div>`;
            }
        }

        // ==========================================
        // STORAGE & STATE MANAGEMENT
        // ==========================================
        function loadState() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    appState = { ...appState, ...parsed };
                    // Ensure chats array exists
                    if (!Array.isArray(appState.chats)) appState.chats = [];
                }
            } catch (e) {
                console.warn("Failed to load state from localStorage");
            }
        }

        function saveState() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
            } catch (e) {
                console.warn("Failed to save state to localStorage");
            }
        }

        // ==========================================
        // UI HELPERS (THEME, MODALS, SIDEBAR)
        // ==========================================
        function toggleTheme() {
            appState.darkMode = !appState.darkMode;
            applyTheme();
            saveState();
        }

        function applyTheme() {
            const html = document.documentElement;
            const themeBtn = document.getElementById('theme-btn');
            
            if (appState.darkMode) {
                html.classList.add('dark');
                themeBtn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>`;
            } else {
                html.classList.remove('dark');
                themeBtn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>`;
            }
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        function openSettings() {
            const modal = document.getElementById('settings-modal');
            const card = document.getElementById('settings-card');
            modal.classList.remove('hidden');
            // Trigger animation
            requestAnimationFrame(() => {
                modal.classList.remove('opacity-0');
                card.classList.remove('scale-95');
                card.classList.add('scale-100');
            });
        }

        function closeSettings() {
            const modal = document.getElementById('settings-modal');
            const card = document.getElementById('settings-card');
            modal.classList.add('opacity-0');
            card.classList.remove('scale-100');
            card.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 200);
        }

        function saveSettings() {
            appState.apiKey = document.getElementById('api-key-input').value.trim();
            appState.model = document.getElementById('model-select').value;
            appState.systemPrompt = document.getElementById('system-prompt-input').value.trim();
            saveState();
            updateHeaderModel();
            closeSettings();
        }

        function updateHeaderModel() {
            const select = document.getElementById('model-select');
            const name = select.options[select.selectedIndex].text;
            document.getElementById('header-model-name').textContent = name;
        }

        function setupTextareaAutoResize() {
            const tx = document.getElementById('chat-input');
            tx.addEventListener("input", function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + "px";
                if(this.value === '') this.style.height = 'auto';
            });
            tx.addEventListener("keydown", function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            });
        }

        // ==========================================
        // CHAT MANAGEMENT
        // ==========================================
        function generateId() {
            return Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
        }

        function createNewChat() {
            if (isGenerating) return;
            const newChat = {
                id: generateId(),
                title: 'New Chat',
                messages: []
            };
            appState.chats.unshift(newChat);
            selectChat(newChat.id);
            if (window.innerWidth < 768) toggleSidebar();
        }

        function selectChat(id) {
            if (isGenerating) return;
            appState.currentChatId = id;
            saveState();
            renderChatList();
            renderMessages();
            if (window.innerWidth < 768 && !document.getElementById('sidebar').classList.contains('-translate-x-full')) {
                toggleSidebar();
            }
        }

        function deleteChat(id, event) {
            event.stopPropagation();
            if (isGenerating) return;
            if (!confirm("Delete this chat?")) return;
            
            appState.chats = appState.chats.filter(c => c.id !== id);
            if (appState.currentChatId === id) {
                appState.currentChatId = appState.chats.length > 0 ? appState.chats[0].id : null;
            }
            if (appState.chats.length === 0) createNewChat();
            else { saveState(); renderChatList(); renderMessages(); }
        }

        function renameChat(id, event) {
            event.stopPropagation();
            const chat = appState.chats.find(c => c.id === id);
            if (!chat) return;
            const newTitle = prompt("Enter new title:", chat.title);
            if (newTitle && newTitle.trim()) {
                chat.title = newTitle.trim();
                saveState();
                renderChatList();
                if (appState.currentChatId === id) {
                    document.getElementById('current-chat-title').textContent = chat.title;
                }
            }
        }

        function renderChatList() {
            const container = document.getElementById('chat-list');
            container.innerHTML = '';
            
            appState.chats.forEach(chat => {
                const isActive = chat.id === appState.currentChatId;
                const div = document.createElement('div');
                div.className = `group flex items-center justify-between p-2.5 rounded-xl cursor-pointer transition-colors ${isActive ? 'bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-300 font-medium' : 'hover:bg-gray-200 dark:hover:bg-gray-800 text-gray-700 dark:text-gray-300'}`;
                div.onclick = () => selectChat(chat.id);
                
                div.innerHTML = `
                    <div class="flex items-center gap-3 overflow-hidden flex-1">
                        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                        <span class="truncate text-sm">${escapeHTML(chat.title)}</span>
                    </div>
                    <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="renameChat('${chat.id}', event)" class="p-1 hover:text-blue-500 rounded"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg></button>
                        <button onclick="deleteChat('${chat.id}', event)" class="p-1 hover:text-red-500 rounded"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // ==========================================
        // MESSAGE RENDERING
        // ==========================================
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag] || tag));
        }

        function renderMessages() {
            const chat = appState.chats.find(c => c.id === appState.currentChatId);
            const container = document.getElementById('chat-messages');
            const welcome = document.getElementById('welcome-screen');
            const titleEl = document.getElementById('current-chat-title');
            
            if (!chat) return;
            titleEl.textContent = chat.title;

            // Clear except welcome screen
            Array.from(container.children).forEach(child => {
                if (child.id !== 'welcome-screen') child.remove();
            });

            if (chat.messages.length === 0) {
                welcome.classList.remove('hidden');
                setTimeout(() => welcome.classList.remove('opacity-0'), 50);
            } else {
                welcome.classList.add('hidden');
                welcome.classList.add('opacity-0');
                
                chat.messages.forEach((msg, index) => {
                    const isLast = index === chat.messages.length - 1;
                    appendMessageUI(msg.role, msg.content, isLast && isGenerating);
                });
                scrollToBottom();
            }
        }

        function appendMessageUI(role, content, isTyping = false) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            
            if (role === 'user') {
                div.className = "flex w-full justify-end animate-fade-in";
                div.innerHTML = `
                    <div class="bg-blue-600 text-white max-w-[85%] sm:max-w-[75%] rounded-3xl rounded-tr-sm px-5 py-3 shadow-sm whitespace-pre-wrap break-words leading-relaxed">
                        ${escapeHTML(content)}
                    </div>
                `;
            } else {
                div.className = "flex w-full justify-start animate-fade-in";
                const parsedContent = typeof marked !== 'undefined' ? marked.parse(content) : escapeHTML(content);
                const cursorHtml = isTyping ? '<span class="typing-cursor"></span>' : '';
                
                div.innerHTML = `
                    <div class="flex gap-4 max-w-[95%] sm:max-w-[85%]">
                        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex-shrink-0 flex items-center justify-center text-white shadow-sm mt-1">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                        </div>
                        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-3xl rounded-tl-sm px-5 py-4 shadow-sm text-gray-800 dark:text-gray-200 prose dark:prose-invert max-w-none break-words overflow-x-auto">
                            ${parsedContent}${cursorHtml}
                        </div>
                    </div>
                `;
                // If it's the last AI message, give it an ID for real-time updates
                if (isTyping) {
                    div.id = 'active-ai-message';
                }
            }
            container.appendChild(div);
        }

        function updateActiveAIMessage(content, isDone = false) {
            const activeMsg = document.getElementById('active-ai-message');
            if (!activeMsg) return;
            
            const contentBox = activeMsg.querySelector('.prose');
            if (contentBox) {
                const parsed = typeof marked !== 'undefined' ? marked.parse(content) : escapeHTML(content);
                const cursorHtml = isDone ? '' : '<span class="typing-cursor"></span>';
                contentBox.innerHTML = parsed + cursorHtml;
            }
        }

        function scrollToBottom() {
            window.scrollTo({
                top: document.body.scrollHeight,
                behavior: 'smooth'
            });
        }

        // ==========================================
        // API COMMUNICATION (STREAMING)
        // ==========================================
        async function handleSend() {
            if (isGenerating) {
                // Handle Stop Generation
                if (abortController) abortController.abort();
                isGenerating = false;
                toggleInputState(false);
                return;
            }

            const inputEl = document.getElementById('chat-input');
            const text = inputEl.value.trim();
            if (!text) return;

            if (!appState.apiKey) {
                alert("Please set your OpenRouter API Key in the Settings menu first.");
                openSettings();
                return;
            }

            const chat = appState.chats.find(c => c.id === appState.currentChatId);
            if (!chat) return;

            // Generate title on first user message
            if (chat.title === 'New Chat' && chat.messages.length === 0) {
                chat.title = text.slice(0, 30) + (text.length > 30 ? '...' : '');
                document.getElementById('current-chat-title').textContent = chat.title;
            }

            // User message
            chat.messages.push({ role: 'user', content: text });
            inputEl.value = '';
            inputEl.style.height = 'auto';
            
            // AI Placeholder
            chat.messages.push({ role: 'assistant', content: '' });
            
            saveState();
            renderChatList();
            renderMessages();
            
            // Toggle UI state
            isGenerating = true;
            toggleInputState(true);
            abortController = new AbortController();

            try {
                // Build Payload
                const apiMessages = [
                    { role: 'system', content: appState.systemPrompt },
                    ...chat.messages.slice(0, -1).map(m => ({ role: m.role, content: m.content }))
                ];

                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${appState.apiKey}`,
                        'HTTP-Referer': window.location.href,
                        'X-Title': 'Aura AI Chat Interface'
                    },
                    body: JSON.stringify({
                        model: appState.model,
                        messages: apiMessages,
                        stream: true
                    }),
                    signal: abortController.signal
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error?.message || `HTTP Error ${response.status}`);
                }

                // Parse stream
                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let fullText = "";
                let buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // Keep incomplete line in buffer
                    
                    for (let line of lines) {
                        line = line.trim();
                        if (!line || line === 'data: [DONE]') continue;
                        
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                const delta = data.choices[0]?.delta?.content || "";
                                fullText += delta;
                                
                                // Throttle UI updates slightly if needed, but direct update provides best typing feel
                                updateActiveAIMessage(fullText, false);
                                
                                // Auto-scroll strictly when near bottom
                                if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
                                    scrollToBottom();
                                }
                            } catch (e) {
                                // Ignore parse errors for fragmented chunks
                            }
                        }
                    }
                }

                // Finalize
                chat.messages[chat.messages.length - 1].content = fullText;
                updateActiveAIMessage(fullText, true);
                document.getElementById('active-ai-message')?.removeAttribute('id');

            } catch (error) {
                if (error.name !== 'AbortError') {
                    const errText = `**Error:** ${error.message}`;
                    chat.messages[chat.messages.length - 1].content = errText;
                    updateActiveAIMessage(errText, true);
                } else {
                    updateActiveAIMessage(chat.messages[chat.messages.length - 1].content + " *(Stopped)*", true);
                }
            } finally {
                isGenerating = false;
                abortController = null;
                toggleInputState(false);
                saveState();
            }
        }

        function toggleInputState(generating) {
            const btn = document.getElementById('send-btn');
            const sendIcon = document.getElementById('send-icon');
            const stopIcon = document.getElementById('stop-icon');
            
            if (generating) {
                btn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
                btn.classList.add('bg-gray-600', 'hover:bg-gray-700', 'dark:bg-gray-700', 'dark:hover:bg-gray-600');
                sendIcon.classList.add('hidden');
                stopIcon.classList.remove('hidden');
            } else {
                btn.classList.add('bg-blue-600', 'hover:bg-blue-700');
                btn.classList.remove('bg-gray-600', 'hover:bg-gray-700', 'dark:bg-gray-700', 'dark:hover:bg-gray-600');
                sendIcon.classList.remove('hidden');
                stopIcon.classList.add('hidden');
            }
        }

        // Add base styles dynamically for fade-in animations
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
            .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        `;
        document.head.appendChild(style);

        // Run application
        window.onload = initApp;

    </script>
</body>
</html>
